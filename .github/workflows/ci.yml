name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Check lockfile
        run: uv lock --locked

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff Check
        run: uv run ruff check --diff --verbose .

      - name: Run Ruff Format
        run: uv run ruff format --check --diff --verbose .

      - name: Run TY Check
        run: uv run ty check --verbose
